{% extends "base.html" %}

{% block content %}

{% for post in posts %}
  {% include "post_content.html" %}
{% endfor %}

<div id="pagination">
  <div id="future">
    {% if future != -1 %}
      ← <a href="index{{ future }}.html">future</a>
    {% endif %}
  </div>
  <div id="past">
    {% if past != -1 %}
      <a href="index{{ past }}.html">past</a> →
    {% endif %}
  </div>
</div>

{% endblock %}
