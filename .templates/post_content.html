{% block content %}
  <article>
    <h2>
      <a href="../{{ post.name }}">
        {{ post.title }}
      </a>
    </h2>
    {{ post.content }}
  </article>
  <div class="date">{{ post.date }}</div>
  <div class="tags">
    <span>
      {% include "tags.html" %}
    </span>
  </div>
{% endblock %}
